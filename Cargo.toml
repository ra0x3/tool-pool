[workspace]
members = ["crates/rmcp", "crates/rmcp-macros", "examples/*"]
exclude = [
    "examples/rig-integration",
    "examples/wasm-fullstack",
    # Original directory - deprecated
    "examples/wasm-fullstack-v1",
    # V1 example - requires WasmEdge-specific patches
    "examples/wasm-fullstack-v2",  # V2 example - requires WasmEdge-specific patches
]
default-members = ["crates/rmcp", "crates/rmcp-macros"]
resolver = "2"

[workspace.dependencies]
rmcp = { version = "0.14.0", path = "./crates/rmcp" }
rmcp-macros = { version = "0.14.0", path = "./crates/rmcp-macros" }

[workspace.package]
edition = "2024"
version = "0.13.0"
authors = ["4t145 <u4t145@163.com>", "ra0x3 <ractz@pm.me>"]
license = "Apache-2.0"
repository = "https://github.com/modelcontextprotocol/rust-sdk/"
description = "Rust SDK for Model Context Protocol"
keywords = ["mcp", "sdk", "tokio", "modelcontextprotocol"]
homepage = "https://github.com/modelcontextprotocol/rust-sdk"
categories = ["network-programming", "asynchronous"]
readme = "README.md"
