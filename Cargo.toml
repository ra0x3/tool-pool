[workspace]
members = ["crates/rmcp", "crates/rmcp-macros", "examples/*"]
exclude = ["examples/rig-integration"]
default-members = ["crates/rmcp", "crates/rmcp-macros"]
resolver = "2"

[workspace.dependencies]
rmcp = { version = "0.13.0", path = "./crates/rmcp" }
rmcp-macros = { version = "0.13.0", path = "./crates/rmcp-macros" }

[workspace.package]
edition = "2024"
version = "0.13.0"
authors = ["4t145 <u4t145@163.com>"]
license = "Apache-2.0"
repository = "https://github.com/modelcontextprotocol/rust-sdk/"
description = "Rust SDK for Model Context Protocol"
keywords = ["mcp", "sdk", "tokio", "modelcontextprotocol"]
homepage = "https://github.com/modelcontextprotocol/rust-sdk"
categories = ["network-programming", "asynchronous"]
readme = "README.md"

# WasmEdge patches for real PostgreSQL and HTTP support in wasm-fullstack example
[patch.crates-io]
tokio = { git = "https://github.com/second-state/wasi_tokio.git", branch = "v1.36.x" }
socket2 = { git = "https://github.com/second-state/socket2.git", branch = "v0.5.x" }
tokio-postgres = { git = "https://github.com/second-state/rust-postgres.git" }
postgres-types = { git = "https://github.com/second-state/rust-postgres.git" }
postgres-protocol = { git = "https://github.com/second-state/rust-postgres.git" }
